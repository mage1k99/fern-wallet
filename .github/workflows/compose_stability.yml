name: Composables stability

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  compose_stability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GIT
        uses: actions/checkout@v4

      - name: Setup Java SDK
        uses: actions/setup-java@v4
      - name: Create mock google-services.json
        run: echo "{\"project_info\":{\"project_number\":\"0\",\"project_id\":\"mock\"},\"client\":[{\"client_info\":{\"mobilesdk_app_id\":\"mock\",\"android_client_info\":{\"package_name\":\"com.fern.wallet.debug\"}},\"api_key\":[{\"current_key\":\"mock\"}]}]}" > app/google-services.json
        with:
          distribution: 'temurin'
          java-version: '18'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Compose compiler report (Jetpack Compose)
        run: ./gradlew assembleDemo -PcomposeCompilerReports=true

      - name: Analyze the report (Ivy)
        run: ./gradlew :ci-actions:compose-stability:run

      - name: Upload the Compose Stability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-stability-report
          path: ci-actions/compose-stability/fern-compose-stability-report.txt